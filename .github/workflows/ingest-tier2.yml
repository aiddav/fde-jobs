name: ingest-tier2

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: git config user.name "fde-jobs-bot"
      - run: git config user.email "fde-jobs-bot@users.noreply.github.com"
      - run: pnpm ingest:tier2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ingest-tier2-raw
          path: ingest/raw
          if-no-files-found: ignore
          retention-days: 7
