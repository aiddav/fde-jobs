name: weekly-tracker

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: git config user.name "fde-jobs-bot"
      - run: git config user.email "fde-jobs-bot@users.noreply.github.com"
      - run: pnpm snapshot:history
      - run: |
          if git diff --quiet -- src/content/data/history.json; then
            echo "No history changes"
            exit 0
          fi
          git add src/content/data/history.json
          git commit -m "tracker: weekly live-role snapshot"
          git push
